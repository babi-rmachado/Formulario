<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="">
        <label for="">Nome:</label>
        <input type="text">
        <br>
        <br>
        <label for="">Data de Nascimento:</label>
        <input type="date" name="" id="">
        <br>
        <label for="">Digite sua Idade:</label>
        <input type="number" required> 
        <br>
        <label for="">Digite seu E-mail:</label>
        <input type="email">
        <br>
        <label for="">Digite sua senha</label>
        <input type="password">
        <br>
        <label for="">Masculino</label>
        <input type="radio" name="sexo">
        <br>
        <label for="">Feminino</label>
        <input type="radio" name="sexo">
        <br>
        <label for="">Outros</label>
        <input type="radio" name="sexo" id="">
        <br>
        <label for="">Eu tenho uma bicicleta:</label>
        <input type="checkbox">
        <br> 
        <label for="">Eu tenho um carro:</label>
        <input type="checkbox">
        <br>
        <!--Drop-down (Lista selecionável)-->
        <label for="">Escolha um Estado:</label>
        <select name="ListaSelecionavel" id="">
            <option value="RJ">RJ</option>
            <option value="DF">DF</option>
            <option value="MG">MG</option>
            <option value="ES">ES</option>
            <option value="GO">GO</option>
        </select>
        <br>
        <input type="submit">
    </form>
</body>
</html>
